<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3348;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --text: #e2e4f0;
      --text-muted: #7b82a6;
      --pin: #f59e0b;
      --danger: #ef4444;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .version { font-size: 0.75rem; color: var(--text-muted); }

    /* ── Create form ─────────────────────────────────────────────────── */
    .create-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 2rem;
    }
    .create-card h2 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: .05em; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 80px; margin-top: 0.5rem; }

    .row { display: flex; gap: 0.75rem; margin-top: 0.75rem; align-items: center; }
    .pin-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; color: var(--text-muted); cursor: pointer; user-select: none; }
    .pin-label input { accent-color: var(--pin); width: 15px; height: 15px; cursor: pointer; }

    button {
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Note list ───────────────────────────────────────────────────── */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .notes-header h2 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .count { font-size: 0.75rem; background: var(--surface2); color: var(--text-muted); padding: 2px 8px; border-radius: 999px; }

    .notes-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      position: relative;
      transition: border-color 0.15s;
    }
    .note-card:hover { border-color: #3e4460; }
    .note-card.pinned { border-left: 3px solid var(--pin); }

    .note-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .note-title {
      font-weight: 600;
      font-size: 1rem;
      flex: 1;
      word-break: break-word;
    }
    .pin-badge {
      font-size: 0.7rem;
      background: rgba(245,158,11,0.15);
      color: var(--pin);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .note-content {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note-content:empty { display: none; }

    .note-meta {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .note-date { font-size: 0.75rem; color: var(--text-muted); }

    .note-actions { display: flex; gap: 0.4rem; }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.6rem;
      border-radius: 5px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }
    .btn-icon.active { color: var(--pin); border-color: var(--pin); background: rgba(245,158,11,0.08); }

    /* editing state */
    .note-card.editing .note-title,
    .note-card.editing .note-content { display: none; }
    .edit-fields { display: none; }
    .note-card.editing .edit-fields { display: flex; flex-direction: column; gap: 0.5rem; }
    .edit-actions { display: flex; gap: 0.5rem; }
    .btn-save { background: var(--accent); color: #fff; padding: 0.35rem 0.9rem; font-size: 0.8rem; border-radius: 5px; border: none; cursor: pointer; }
    .btn-cancel { background: var(--surface2); color: var(--text-muted); padding: 0.35rem 0.9rem; font-size: 0.8rem; border-radius: 5px; border: 1px solid var(--border); cursor: pointer; }

    /* ── Empty & loading states ──────────────────────────────────────── */
    .empty { text-align: center; padding: 3rem 0; color: var(--text-muted); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    /* ── Toast ───────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left-color: var(--danger); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Quick <span>Notes</span></h1>
    <span class="version" id="app-version">v—</span>
  </header>

  <!-- Create form -->
  <div class="create-card">
    <h2>New Note</h2>
    <input type="text" id="new-title" placeholder="Title" maxlength="200" />
    <textarea id="new-content" placeholder="Content (optional)"></textarea>
    <div class="row">
      <label class="pin-label">
        <input type="checkbox" id="new-pinned" />
        Pin to top
      </label>
      <button class="btn-primary" id="btn-create" onclick="createNote()">Add Note</button>
    </div>
  </div>

  <!-- Notes list -->
  <div class="notes-header">
    <h2>Notes</h2>
    <span class="count" id="note-count">0</span>
  </div>
  <div class="notes-list" id="notes-list">
    <div class="loading">Loading…</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = '/api';

  // ── Utilities ──────────────────────────────────────────────────────────────

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
      + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  let toastTimer;
  function showToast(msg, error = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (error ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── API calls ──────────────────────────────────────────────────────────────

  async function apiFetch(path, options = {}) {
    const resp = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || 'Request failed');
    }
    if (resp.status === 204) return null;
    return resp.json();
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function noteCard(note) {
    return `
      <div class="note-card${note.pinned ? ' pinned' : ''}" id="note-${note.id}" data-id="${note.id}">
        <div class="note-title-row">
          <span class="note-title">${escHtml(note.title)}</span>
          ${note.pinned ? '<span class="pin-badge">📌 Pinned</span>' : ''}
        </div>
        <div class="note-content">${escHtml(note.content)}</div>

        <div class="edit-fields">
          <input type="text" class="edit-title" value="${escAttr(note.title)}" maxlength="200" />
          <textarea class="edit-content">${escHtml(note.content)}</textarea>
          <div class="edit-actions">
            <button class="btn-save" onclick="saveEdit('${note.id}')">Save</button>
            <button class="btn-cancel" onclick="cancelEdit('${note.id}')">Cancel</button>
          </div>
        </div>

        <div class="note-meta">
          <span class="note-date">${formatDate(note.created_at)}</span>
          <div class="note-actions">
            <button class="btn-icon${note.pinned ? ' active' : ''}" onclick="togglePin('${note.id}', ${note.pinned})" title="${note.pinned ? 'Unpin' : 'Pin'}">
              📌
            </button>
            <button class="btn-icon" onclick="startEdit('${note.id}')" title="Edit">✏️</button>
            <button class="btn-icon danger" onclick="deleteNote('${note.id}')" title="Delete">🗑️</button>
          </div>
        </div>
      </div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escAttr(s) {
    return String(s).replace(/"/g, '&quot;');
  }

  async function loadNotes() {
    try {
      const notes = await apiFetch('/notes/');
      const list = document.getElementById('notes-list');
      document.getElementById('note-count').textContent = notes.length;
      if (notes.length === 0) {
        list.innerHTML = `<div class="empty"><div class="icon">📝</div><p>No notes yet. Create your first one above.</p></div>`;
      } else {
        list.innerHTML = notes.map(noteCard).join('');
      }
    } catch (e) {
      showToast('Failed to load notes: ' + e.message, true);
    }
  }

  async function loadVersion() {
    try {
      const data = await apiFetch('/health');
      document.getElementById('app-version').textContent = 'v' + data.version;
    } catch {}
  }

  // ── Actions ────────────────────────────────────────────────────────────────

  async function createNote() {
    const title = document.getElementById('new-title').value.trim();
    const content = document.getElementById('new-content').value;
    const pinned = document.getElementById('new-pinned').checked;

    if (!title) {
      showToast('Title is required', true);
      document.getElementById('new-title').focus();
      return;
    }

    const btn = document.getElementById('btn-create');
    btn.disabled = true;
    try {
      await apiFetch('/notes/', { method: 'POST', body: JSON.stringify({ title, content, pinned }) });
      document.getElementById('new-title').value = '';
      document.getElementById('new-content').value = '';
      document.getElementById('new-pinned').checked = false;
      showToast('Note created');
      await loadNotes();
    } catch (e) {
      showToast('Error: ' + e.message, true);
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    try {
      await apiFetch('/notes/' + id, { method: 'DELETE' });
      showToast('Note deleted');
      await loadNotes();
    } catch (e) {
      showToast('Error: ' + e.message, true);
    }
  }

  async function togglePin(id, currentlyPinned) {
    try {
      await apiFetch('/notes/' + id, {
        method: 'PATCH',
        body: JSON.stringify({ pinned: !currentlyPinned }),
      });
      showToast(currentlyPinned ? 'Unpinned' : 'Pinned');
      await loadNotes();
    } catch (e) {
      showToast('Error: ' + e.message, true);
    }
  }

  function startEdit(id) {
    const card = document.getElementById('note-' + id);
    card.classList.add('editing');
    card.querySelector('.edit-title').focus();
  }

  function cancelEdit(id) {
    document.getElementById('note-' + id).classList.remove('editing');
  }

  async function saveEdit(id) {
    const card = document.getElementById('note-' + id);
    const title = card.querySelector('.edit-title').value.trim();
    const content = card.querySelector('.edit-content').value;
    if (!title) { showToast('Title is required', true); return; }
    try {
      await apiFetch('/notes/' + id, {
        method: 'PATCH',
        body: JSON.stringify({ title, content }),
      });
      showToast('Saved');
      await loadNotes();
    } catch (e) {
      showToast('Error: ' + e.message, true);
    }
  }

  // Allow Ctrl+Enter to submit the create form
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') {
      const focused = document.activeElement;
      if (focused && (focused.id === 'new-title' || focused.id === 'new-content')) {
        createNote();
      }
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadVersion();
  loadNotes();
</script>
</body>
</html>
